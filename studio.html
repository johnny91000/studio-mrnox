    <div class="container">
        <section id="commander">
            <div class="section-header">
                <span class="subtitle">BOOKING SYSTEM</span>
                <h2><span>/</span> RÉSERVER UNE SESSION</h2>
            </div>

            <div class="order-box-premium">
                <form data-netlify="true" name="contact-studio" method="POST">
                    <input type="hidden" name="form-name" value="contact-studio">
                    
                    <div class="form-main-grid">
                        <div class="form-row">
                            <div class="input-wrapper">
                                <i class="fas fa-signature"></i>
                                <input type="text" name="name" placeholder="NOM D'ARTISTE" required>
                            </div>
                            <div class="input-wrapper">
                                <i class="fas fa-at"></i>
                                <input type="email" name="email" placeholder="VOTRE EMAIL" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="input-wrapper">
                                <i class="fas fa-compact-disc"></i>
                                <select name="service" required>
                                    <option value="" disabled selected>CHOISIR UN SERVICE</option>
                                    <option value="instru">INSTRU SEULE - 5€</option>
                                    <option value="pack">PACK COMPLET - 10€</option>
                                    <option value="album">PROJET COMPLET - DEVIS</option>
                                </select>
                            </div>
                            <div class="input-wrapper">
                                <i class="fas fa-calendar-day"></i>
                                <input type="date" name="date_preferee" required>
                            </div>
                        </div>

                        <div class="input-wrapper">
                            <i class="fas fa-terminal"></i>
                            <textarea name="details" rows="4" placeholder="DÉTAILS DU PROJET (BPM, STYLE, RÉFÉRENCES...)" required></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn-studio-neon">
                        LANCER LE PROJET <i class="fas fa-rocket"></i>
                    </button>
                </form>

                <div class="privacy-link" style="margin-top: 20px; text-align: center;">
                    <a href="legal.html" style="color: #444; font-size: 0.65rem; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s;">
                        Données sécurisées • <span style="text-decoration: underline;">Politique de confidentialité</span>
                </a>
            </div>
        </div> </section>
