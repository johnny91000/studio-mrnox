<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Introuvable | MR NOX TV</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style/studio.css" />
    <link rel="stylesheet" href="../assets/style/404.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
    <div id="cursor-glow"></div>

    <nav class="py-3 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div id="navigation-bar" class="d-flex gap-4">
                <a class="nav-link" data-en="HOME" data-redirection="accueil">ACCUEIL</a>
                <a class="nav-link active" data-en="STUDIO" data-redirection="studio">STUDIO</a>
                <a class="nav-link" data-en="CREATIONS" data-redirection="creations">CRÉATIONS</a>
                <a class="nav-link" data-en="ABOUT" data-redirection="apropos">À PROPOS</a>
            </div>

            <div class="lang-switch">
                <button onclick="changeLang('fr')" id="btn-fr" class="active">FR</button>
                <span class="text-secondary mx-1">/</span>
                <button onclick="changeLang('en')" id="btn-en">EN</button>
            </div>
        </div>
    </nav>

    <main class="error-wrapper d-flex align-items-center justify-content-center text-center">
        <div class="container">
            <div class="error-content">
                <h1 class="glitch-text">404</h1>
                <div class="error-divider"></div>
                <h2 data-en="LOST IN THE STUDIO?">PERDU DANS LE STUDIO ?</h2>
                <p class="mb-5 opacity-75" data-en="The page you are looking for doesn't exist or has been moved.">
                    La page que vous cherchez n'existe pas ou a été déplacée.
                </p>
                <a class="btn-main cursor-pointer" data-redirection="accueil" data-en="GO BACK HOME">
                    <i class="fas fa-home me-2"></i> RETOUR À L'ACCUEIL
                </a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/script.js"></script>
    <script src="../script/redirection.js"></script>
</body>
</html>
