<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merci ! | MR NOX TV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style/merci.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body>
    <div id="cursor-glow"></div>

    <nav class="py-3 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div id="navigation-bar" class="d-flex gap-4">
                <a class="nav-link cursor-pointer" data-en="HOME" data-redirection="accueil">ACCUEIL</a>
                <a class="nav-link cursor-pointer" data-en="STUDIO" data-redirection="studio">STUDIO</a>
                <a class="nav-link cursor-pointer" data-en="CREATIONS" data-redirection="creations">CRÉATIONS</a>
                <a class="nav-link cursor-pointer" data-en="ABOUT" data-redirection="apropos">À PROPOS</a>
            </div>

            <div class="lang-switch">
                <button onclick="changeLang('fr')" id="btn-fr" class="active">FR</button>
                <span class="text-secondary mx-1">/</span>
                <button onclick="changeLang('en')" id="btn-en">EN</button>
            </div>
        </div>
    </nav>


    <main class="hero d-flex align-items-center justify-content-center text-center">
        <div class="container">
            <div class="thank-you-box p-5">
                <div class="icon-success mb-4">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <h1 class="demande-reçu mb-3" data-en="REQUEST RECEIVED !">
                    DEMANDE REÇUE !
                </h1>
                <p class="mb-5 opacity-75"
                    data-en="I will get back to you very quickly by email to confirm your session.">
                    Je reviens vers toi très vite par mail pour confirmer ta session.
                </p>
                <div class="retour-accueil">
                    <a class="btn-main cursor-pointer" data-redirection="accueil" data-en="BACK TO HOME">RETOUR À
                        L'ACCUEIL</a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/script.js"></script>
    <script src="../script/redirection.js"></script>
</body>

</html>
