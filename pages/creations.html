    <div id="cursor-glow"></div>

    <nav class="py-3 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">

                <button onclick="changeLang('en')" id="btn-en">EN</button>

        <div class="row g-4 justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="portfolio-card text-center p-4 h-100">
                    <div class="cover-wrapper mb-3">
                        <img src="../assets/img/portu.webp" alt="Cover Portuguesa" class="img-fluid cover-art pink-glow"

                    </div>

                        class="btn-listen" data-en="LISTEN">ÉCOUTER</a>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="portfolio-card text-center p-4 h-100">
                    <div class="cover-wrapper mb-3">
                        <img src="../assets/img/Espagnola.webp" alt="Cover Española"

                    </div>
                    <h3 class="title-blue">ESPAÑOLA</h3>
                    <p class="genre-text" data-en="REGGAETON MIX">REGGAETON MIX</p>
                    <a href="https://www.tiktok.com/@mrnox_tv/video/7547272446160686358" target="_blank"
                        class="btn-listen" data-en="LISTEN">ÉCOUTER</a>
                </div>
            </div>
        </div>

        <section class="coming-soon-section mt-5 pt-5">
            <h2 class="section-title text-center mb-4 fw-black text-uppercase">
                <span>/</span> <span data-en="COMING SOON">PROCHAINEMENT</span>
            </h2>
            <div class="mystery-box p-5 text-center">
                <h3 class="suspense-text" data-en="MYSTERY PROJECT">PROJET MYSTÈRE</h3>
                <p class="mystery-desc mt-3" data-en="Something is brewing in the shadows...">
                    Quelque chose se prépare dans l'ombre...

    <footer class="py-5 mt-5 border-dark">
        <div class="container text-center">
            <div class="social-links mb-4">
                <a href="https://instagram.com/mrnox_tv" target="_blank" class="mx-3 fs-3"><i

                <a href="https://tiktok.com/@mrnox_tv" target="_blank" class="mx-3 fs-3"><i
                        class="fab fa-tiktok"></i></a>
